name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install -g @capacitor/cli
          if [ ! -f package.json ]; then
            npm init -y
          fi
          npm install @capacitor/core @capacitor/android

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Fix Gradle Issues
        run: |
          cd android
          # Clear gradle cache to avoid corrupt jar issues
          rm -rf ~/.gradle/caches/jars-9/
          
          # Fix Duplicate class kotlin.text.jdk8.RegexExtensionsJDK8Kt
          # This happens because of conflicts between kotlin-stdlib and kotlin-stdlib-jdk8
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin' && details.requested.name.startsWith('kotlin-stdlib-jdk')) {
                      details.useTarget 'org.jetbrains.kotlin:kotlin-stdlib:' + details.requested.version
                  }
              }
          }" >> build.gradle

          chmod +x gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
